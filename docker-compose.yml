services:
  postgres:
    image: postgres:16-alpine
    container_name: transcription-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcription}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcription}
      POSTGRES_DB: ${POSTGRES_DB:-transcription}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcription} -d ${POSTGRES_DB:-transcription}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [transcription]

  api:
    image: ${API_IMAGE:-transcription-api:local}
    build: .
    container_name: transcription-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-transcription}:${POSTGRES_PASSWORD:-transcription}@postgres:5432/${POSTGRES_DB:-transcription}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [transcription]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: transcription-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=1GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [transcription]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: transcription-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    restart: unless-stopped
    networks: [transcription]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: transcription-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    restart: unless-stopped
    networks: [transcription]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: transcription-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-transcription}:${POSTGRES_PASSWORD:-transcription}@postgres:5432/${POSTGRES_DB:-transcription}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [transcription]

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  transcription:
    driver: bridge