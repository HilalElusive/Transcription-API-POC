---
- name: Install K3s and deploy stack on Phase 2 cluster
  hosts: k8s
  become: true
  gather_facts: true

  vars:
    k8s_manifests_remote_dir: /home/ubuntu/manifests
    k8s_manifests_local_dir: "{{ playbook_dir }}/../k8s/manifests"

  pre_tasks:
    - name: Validate required secrets are provided
      ansible.builtin.assert:
        that:
          - openai_api_key is defined and openai_api_key | length > 0
          - openai_api_key != "sk-replace-me"
          - postgres_password is defined and postgres_password | length > 0
          - gitlab_registry_token is defined
          - gitlab_registry_token != "glpat-replace-me"
          - api_image is defined and api_image | length > 0
        fail_msg: "Required secrets missing. Run with --extra-vars '@secrets.yml'"

  tasks:
    # --- Install K3s -----------------------------------------------------
    - name: Check if K3s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s (single-node, write kubeconfig readable by ubuntu)
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --tls-san {{ ansible_host }}" \
          sh -
      when: not k3s_binary.stat.exists
      changed_when: true

    - name: Wait for K3s to be ready
      ansible.builtin.command:
        cmd: k3s kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0 and "Ready" in k3s_ready.stdout
      retries: 30
      delay: 5
      changed_when: false

    - name: Copy kubeconfig to ubuntu's home for laptop fetch
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/k3s.yaml
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    # --- Render and stage manifests --------------------------------------
    - name: Ensure remote manifests directory exists
      ansible.builtin.file:
        path: "{{ k8s_manifests_remote_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy static manifests to remote
      ansible.builtin.copy:
        src: "{{ k8s_manifests_local_dir }}/{{ item }}"
        dest: "{{ k8s_manifests_remote_dir }}/{{ item }}"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      loop:
        - 00-namespace.yaml
        - 20-postgres.yaml

    - name: Render Jinja2 manifests to remote
      ansible.builtin.template:
        src: "{{ k8s_manifests_local_dir }}/{{ item.src }}"
        dest: "{{ k8s_manifests_remote_dir }}/{{ item.dest }}"
        owner: ubuntu
        group: ubuntu
        mode: "0600"  # contains secrets — restrict
      loop:
        - { src: 10-secrets.yaml.j2, dest: 10-secrets.yaml }
        - { src: 30-api.yaml.j2,     dest: 30-api.yaml }

    # --- Apply -----------------------------------------------------------
    - name: Apply manifests in order
      ansible.builtin.command:
        cmd: k3s kubectl apply -f {{ k8s_manifests_remote_dir }}/{{ item }}
      loop:
        - 00-namespace.yaml
        - 10-secrets.yaml
        - 20-postgres.yaml
        - 30-api.yaml
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    # --- Health gate -----------------------------------------------------
    - name: Wait for Postgres StatefulSet to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status statefulset/postgres -n transcription --timeout=180s
      changed_when: false

    - name: Wait for API Deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/transcription-api -n transcription --timeout=180s
      changed_when: false

    - name: Verify API is reachable via NodePort
      ansible.builtin.uri:
        url: "http://localhost:30080/health/ready"
        status_code: 200
      register: nodeport_check
      until: nodeport_check.status == 200
      retries: 10
      delay: 3